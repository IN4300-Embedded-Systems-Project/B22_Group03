; =============================================================================
; PlatformIO Configuration — Forest Acoustic Sentinel
; ESP32-S3 DevKitC-1 N16R8 (16MB Flash, 8MB PSRAM)
; =============================================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash & Memory ---
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; --- Serial Monitor ---
monitor_speed = 115200

; --- Libraries ---
lib_deps =
    sandeepmistry/LoRa@^0.8.0

; --- Build Flags ---
; Enable PSRAM, disable WiFi/BT at compile level for smaller binary
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Edge Impulse Library ---
; Place your exported Edge Impulse Arduino library folder into firmware/lib/
; e.g., firmware/lib/project-1_inferencing/
